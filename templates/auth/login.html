{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="text-center fw-bold mb-4 text-primary">Welcome Back</h2>
                <form method="POST">
                    <div class="mb-4 form-floating">
                        <input type="text" class="form-control" id="username" name="username" required placeholder="Username">
                        <label for="username">Username</label>
                    </div>
                    <div class="mb-4 form-floating">
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Password">
                        <label for="password">Password</label>
                    </div>
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                        <label class="form-check-label text-muted" for="remember_me">Remember Me</label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mb-4 rounded-pill fw-bold shadow-sm">Login</button>
                </form>
                <div class="text-center mt-3 border-top pt-4">
                    <p class="text-muted mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-bold">Sign up here</a>.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
