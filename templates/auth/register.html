{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="text-center fw-bold mb-4 text-primary">Create an Account</h2>
                <p class="text-center text-muted mb-4">Join the community and start curating your ideas.</p>
                
                <form method="POST">
                    <div class="mb-3 form-floating">
                        <input type="text" class="form-control" id="username" name="username" required placeholder="johndoe">
                        <label for="username">Username</label>
                    </div>
                    <div class="mb-3 form-floating">
                        <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                        <label for="email">Email address</label>
                    </div>
                    <div class="mb-4 form-floating">
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Password">
                        <label for="password">Password</label>
                        <div class="form-text mt-2"><i class="bi bi-info-circle"></i> Use at least 8 characters.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 mb-3 rounded-pill fw-bold shadow-sm">Sign Up</button>
                </form>
                <div class="text-center mt-4 border-top pt-4">
                    <p class="text-muted mb-0">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold">Login here</a>.</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
